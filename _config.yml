title: High Performance Spark
description: >-
  Best Practices for Scaling and Optimizing Apache Spark — by Holden Karau, Adi Polak & Rachel Warren.
  Updated for Spark 4. The definitive guide to writing efficient, production-ready Spark applications.
baseurl: ""
url: ""

# Build settings
theme: null
markdown: kramdown
highlighter: rouge
permalink: pretty

# Authors
authors:
  - name: Holden Karau
    bio: >-
      Holden Karau is a transgender Canadian, and is an active open source contributor.
      She is an Apache Spark PMC member and committer, co-author of Learning Spark, and
      the creator of spark-testing-base (1.6k+ stars). She has worked on big data
      infrastructure at Google, IBM, and other companies.
    github: holdenk
    twitter: holdenkarau
    linkedin: holdenkarau
  - name: Adi Polak
    bio: >-
      Adi Polak is a software engineer and developer advocate with deep expertise in
      distributed systems and Apache Spark. She is an active contributor to the Spark
      ecosystem and speaks internationally on big data and cloud-native engineering.
    github: AdiPolak
    linkedin: adipolak
  - name: Rachel Warren
    bio: >-
      Rachel Warren is a software engineer focused on big data infrastructure and
      distributed systems. She has contributed to Apache Spark and other open source
      projects and has extensive experience building production data pipelines.
    github: rw
    linkedin: rachel-warren-spark

# Example repos
example_repos:
  - name: high-performance-spark-examples
    url: https://github.com/high-performance-spark/high-performance-spark-examples
    description: >-
      Complete working code examples from the book — Scala, Python, and Java.
      Covers RDDs, DataFrames, Datasets, Spark SQL, MLlib, Streaming, and more.
    language: Scala / Python / Java
    stars: "530+"
  - name: spark-testing-base
    url: https://github.com/holdenk/spark-testing-base
    description: >-
      Holden's popular testing library for Apache Spark with over 1.6k stars.
      Provides base classes and utilities for writing reliable, fast Spark unit tests.
    language: Scala / Python / Java
    stars: "1.6k+"
  - name: robin-sparkles
    url: https://github.com/high-performance-spark/robin-sparkles
    description: >-
      A proof-of-concept auto-tuner for Apache Spark, automatically finding
      good Spark configuration parameters for your workload.
    language: Scala
    stars: "12+"

# Purchase links
purchase_links:
  - store: Amazon
    url: https://amzn.to/429H5IK
    icon: amazon
  - store: O'Reilly
    url: https://www.oreilly.com/library/view/high-performance-spark/9781098145705/
    icon: oreilly

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
