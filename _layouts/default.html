<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  {% seo %}
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  {{ content }}

  <footer class="site-footer">
    <div class="container">
      <div class="footer-inner">
        <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} Holden Karau &amp; Rachel Warren. All rights reserved.</p>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="https://amzn.to/429H5IK" target="_blank" rel="noopener noreferrer">Buy on Amazon</a>
          <a href="https://github.com/high-performance-spark" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
      </div>
    </div>
  </footer>
</body>
</html>
